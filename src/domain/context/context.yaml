    categories: ["astro-ph.GA", "astro-ph.SR", "astro-ph.IM"]
    aliases: ["Polariscope"]


# ---------------------------------------------------------------------------
# DATASETS / SURVEYS
# ---------------------------------------------------------------------------
datasets:

  # ---- Original entries ----

  SDSS:
    full_name: "Sloan Digital Sky Survey"
    description: >
      Major multi-spectral imaging and spectroscopic redshift survey.
      Multiple data releases (DR1 through DR18+). Covers ~35% of the sky.
    categories: ["astro-ph.GA", "astro-ph.CO"]

  DESI:
    full_name: "Dark Energy Spectroscopic Instrument"
    description: >
      Spectroscopic survey instrument measuring redshifts of galaxies and
      quasars to study dark energy via baryon acoustic oscillations.
    categories: ["astro-ph.CO"]

  Gaia:
    full_name: "Gaia space observatory"
    description: >
      ESA astrometry mission creating a 3D map of the Milky Way.
      Measures positions, distances, and motions of ~2 billion stars.
    categories: ["astro-ph.GA", "astro-ph.SR", "astro-ph.IM"]
    aliases: ["GAIA"]

  # ---- Fictional entries for article demonstration ----

  PHOTON-Z:
    full_name: "PHOTometric Observations of Nebulae at high-Z"
    description: >
      [ARTICLE] A deep photometric survey targeting high-redshift
      galaxy clusters and proto-clusters at z > 2, using multi-band
      imaging to identify cluster candidates via the red sequence method.
    categories: ["astro-ph.CO", "astro-ph.GA"]
    aliases: ["PHOTONZ", "PHOTON Z"]

  SynBio-DB:
    full_name: "Synthetic Biology Database of engineered protein sequences"
    description: >
      [ARTICLE] A curated database of synthetically designed protein
      sequences with experimentally validated stability measurements,
      used as a benchmark for computational protein design methods.
    categories: ["q-bio.BM", "q-bio.GN"]
    aliases: ["SynBioDB", "SynBio DB"]
