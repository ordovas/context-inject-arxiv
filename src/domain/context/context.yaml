    description: "ESO facility at Cerro Paranal, Chile. Four 8.2m unit telescopes."
    categories: ["astro-ph.IM", "astro-ph.GA"]

  ALMA:
    full_name: "Atacama Large Millimeter Array"
    description: "Interferometer in the Atacama desert for mm/sub-mm astronomy."
