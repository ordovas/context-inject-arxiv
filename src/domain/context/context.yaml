  # ---- Fictional entries for article demonstration ----

  NEXUS-II:
    full_name: "Next-generation EUV and X-ray Ultrafast Spectrometer, Mark II"
    description: >
      [ARTICLE] A proposed space-based spectrometer for high-cadence
      X-ray observations of transient phenomena in galaxy clusters,
      AGN variability, and compact object mergers.
    categories: ["astro-ph.HE", "astro-ph.IM", "astro-ph.CO"]
    aliases: ["NEXUS II", "NEXUS2"]

  PolariScope:
