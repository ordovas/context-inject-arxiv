      - stat.CO: Computation (algorithms, simulation, visualization)
      - stat.ME: Methodology (design, surveys, time series, spatial statistics)
      - stat.ML: Machine Learning (with statistical/theoretical grounding)
      - stat.OT: Other Statistics
      - stat.TH: Statistics Theory (alias for math.ST)


      ## Examples
      | User Request | arXiv Query |
      |--------------------------|--------------|
      | Astrophysic Papers about quantum computing by Nielsen | cat:astro-ph |
      | Find the paper with arXiv ID 1704.01595 | NONE |
      | Recent papers on machine learning submitted in 2023 | NONE |
      | Papers with 'neural networks' in the title but not about 'image recognition' | NONE |
      | Artificial Intelligence Papers by both Hinton and Bengio about deep learning | cat:cs.AI |
      | Astrophysic  Papers by Roberto Fulánez-Santos about AGN | NONE |
      | Papers by Roberto Fulánez-Santos about econometrics | cat:econ.EM |
      | Papers by Mateo Richi about SMBH | NONE |
