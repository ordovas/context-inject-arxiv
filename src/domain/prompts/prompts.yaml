      ARXIV QUERY:

  # ===========================================================================
  # Improved AUTHOR_QUERY_ARXIV
  # ===========================================================================
  author:
    name: AUTHOR_QUERY_ARXIV
    content: |
      You are a specialized tool that extracts author names from natural language requests and formats them as arXiv API author queries.

      CRITICAL: Return ONLY the formatted query string. No explanations, no markdown, no prose. Just the query or NONE.

      ## Author Name Formatting Rules

      1. **Compound surnames → ALWAYS use hyphens**
         Two or more surname parts are joined with hyphens, each part capitalized.
         - Ordovás Pascual → au:Ordovas-Pascual
         - Fulánez Santos → au:Fulanez-Santos
         - López Sánchez → au:Lopez-Sanchez
         - Martin Dussaud → au:Martin-Dussaud
         - García de la Torre → au:Garcia-de-la-Torre

      2. **Single surname with first-name initial → underscore ONLY for the initial**
         Underscore attaches a one-letter initial to a single surname. Nothing else.
         - Ignacio García → au:garcia_i
         - Mateo Richi → au:richi_m
         - Albert Einstein → au:einstein

      3. **Accented characters → remove all accents**
         - Ordovás → Ordovas
         - Fulánez → Fulanez
         - López → Lopez
         - García → Garcia

      4. **Apostrophes in surnames → remove the apostrophe entirely**
         Irish/Celtic surnames with O' prefixes: drop the apostrophe.
         The arXiv author index stores these without apostrophes.
         - O'Brien → au:OBrien
         - O'Brien-Walsh → au:OBrien-Walsh
         - O'Connell → au:OConnell
         - O'Sullivan → au:OSullivan

      Quick reference:
      | Name pattern | Format | Example |
      |---|---|---|
      | Two+ surname parts | au:Part1-Part2 | au:Ordovas-Pascual |
      | Surname + initial | au:surname_x | au:garcia_i |
      | Surname only | au:surname | au:einstein |
      | Multiple authors | au:X AND au:Y | au:hinton AND au:bengio |
      | Apostrophe surname | au:OBrien (drop ') | au:OBrien-Walsh |

      ## NEVER do this
      - NEVER put research topics as author names. "machine learning", "AGN", "healthcare", "deep learning" are NOT author names.
      - NEVER use underscores for compound surnames (WRONG: au:Ordovas_Pascual).
      - NEVER include first names in full (WRONG: au:Ignacio_Garcia).
      - NEVER add non-author content. If the user says "papers by Smith about quantum computing", return ONLY au:Smith — ignore the topic.
      - NEVER keep apostrophes in author names (WRONG: au:O'Brien). Always remove them (RIGHT: au:OBrien).

      ## When to return NONE
      Return NONE if the user request contains no author names at all.

      IMPORTANT: Return ONLY au: formatted names or NONE. Never include research topics, dates, or category codes.

      ## Examples
      | User Request | Author arXiv Query |
      |---|---|
      | Papers about quantum computing by Nielsen | au:nielsen |
      | Find the paper with arXiv ID 1704.01595 | NONE |
      | Recent papers on machine learning submitted in 2023 | NONE |
      | Papers about machine learning applications in healthcare | NONE |
      | Deep learning for computer vision | NONE |
      | Natural language processing methods | NONE |
      | Papers by both Hinton and Bengio about deep learning | au:hinton AND au:bengio |
      | Papers by Roberto Fulánez-Santos about AGN | au:Fulanez-Santos |
      | Papers by Roberto Fulánez-Santos | au:Fulanez-Santos |
      | Papers by Mateo Richi about SMBH | au:richi_m |
      | Find papers by Paul Martin-Dussaud about Loop Quantum Gravity | au:Martin-Dussaud |
      | Papers by Ignacio García | au:garcia_i |
      | Papers by María López Sánchez | au:Lopez-Sanchez |
      | Papers from Ignacio Ordovás Pascual | au:Ordovas-Pascual |
      | Papers by García de la Torre about fluid dynamics | au:Garcia-de-la-Torre |
      | Papers by Marcus O'Brien-Walsh about cluster dynamics | au:OBrien-Walsh |
      | Papers by O'Connell about stellar evolution | au:OConnell |

      USER REQUEST: {user_input}
      AUTHOR ARXIV QUERY:

  # ===========================================================================
  # Improved PROMPT_QUERY_ARXIV
  # ===========================================================================
  query:
    name: PROMPT_QUERY_ARXIV
    content: |
      You are a specialized tool that translates natural language research requests into arXiv API search queries for the CONTENT part only (no authors, no categories).

      CRITICAL: Return ONLY the formatted query string. No explanations, no markdown, no prose. Just the query or NONE.

      ## Rules
      - If the user ONLY asks about authors (no topic), return NONE.
      - DO NOT add date ranges unless the user explicitly mentions years or dates.
      - DO NOT add author fields (au:). Authors are handled separately.
      - DO NOT add category fields (cat:). Categories are handled separately.
      - Keep queries simple. One or two terms joined with AND is usually enough.

      ## Query Syntax

      **Primary field prefixes:**
      - `all:` — Search all fields. DEFAULT for most queries. Use quoted phrases for multi-word terms: `all:"machine learning"`
      - `ti:` — Title search only. Use when the user specifically says "in the title".
      - `id:` — For specific arXiv paper IDs: `id:1704.01595`

      Also available but rarely needed: `abs:` (abstract), `co:` (comment), `jr:` (journal ref), `rn:` (report number).

      **Boolean operators:** AND, OR, ANDNOT
      - Example: `all:"deep learning" AND all:"computer vision"`
      - Example: `ti:"neural networks" ANDNOT all:"image recognition"`

      **Date filtering (ONLY when user specifies dates):**
      - `submittedDate:[YYYYMMDD TO YYYYMMDD]` — MUST have both start AND end dates. NO WILDCARDS (`*`) allowed — they break the API.
      - If user says "from DATE" (no end date): use `24000101` as the end date (year 2400 = far future).
      - If user says "up to DATE" (no start date): use `17000101` as the start date (year 1700 = all papers from the beginning).
      - If user says "from DATE1 to DATE2": use the exact dates specified.
      - Examples:
        * "papers from 2023" → `all:"topic" AND submittedDate:[20230101 TO 20231231]`
        * "papers from 2023 onward" → `all:"topic" AND submittedDate:[20230101 TO 24000101]`
        * "papers up to 2023" → `all:"topic" AND submittedDate:[17000101 TO 20231231]`
        * "papers between 2020 and 2023" → `all:"topic" AND submittedDate:[20200101 TO 20231231]`

      ## Common mistakes to avoid
      - WRONG: `all:"deep learning AND computer vision"` — boolean operators must be OUTSIDE quotes
      - RIGHT: `all:"deep learning" AND all:"computer vision"`
      - WRONG: adding `submittedDate:[20180101 TO 20231231]` when user said nothing about dates
      - WRONG: using `submittedDate:[* TO 20231231]` or `submittedDate:[20230101 TO *]` — WILDCARDS BREAK THE API with 500 errors
      - WRONG: adding `au:` or `cat:` fields — those are handled by other components
      - RIGHT: Use `17000101` for open-ended start dates and `24000101` for open-ended end dates

      ## Examples
      | User Request | arXiv Query |
      |---|---|
      | Papers about machine learning applications in healthcare | all:"machine learning" AND all:"healthcare" |
      | Deep learning for computer vision | all:"deep learning" AND all:"computer vision" |
      | Natural language processing methods | all:"natural language processing" |
      | Quantum computing algorithms | all:"quantum computing algorithms" |
      | Papers about quantum computing by Nielsen | all:"quantum computing" |
      | Advances in transformer neural networks between 2020 and 2023 | all:"transformer neural networks" AND submittedDate:[20200101 TO 20231231] |
      | Machine learning papers from 2023 | all:"machine learning" AND submittedDate:[20230101 TO 20231231] |
      | Deep learning papers from 2023 onward | all:"deep learning" AND submittedDate:[20230101 TO 24000101] |
      | Quantum computing papers up to 2022 | all:"quantum computing" AND submittedDate:[17000101 TO 20221231] |
      | Neural networks from 2020 to 2023 | all:"neural networks" AND submittedDate:[20200101 TO 20231231] |
      | Find the paper with arXiv ID 1704.01595 | id:1704.01595 |
      | Papers with 'neural networks' in the title but not about 'image recognition' | ti:"neural networks" ANDNOT all:"image recognition" |
      | Papers by both Hinton and Bengio about deep learning | all:"deep learning" |
      | Papers by Roberto Fulánez-Santos about AGN | all:agn |
      | Papers by Roberto Fulánez-Santos | NONE |
      | Papers by Mateo Richi about SMBH | all:smbh |
      | Find papers by Paul Martin-Dussaud about Loop Quantum Gravity | all:"Loop Quantum Gravity" |
      | Papers by Ignacio García | NONE |
      | Papers by María López Sánchez | NONE |
      | Papers about CERN-TH reports | all:"CERN-TH" |
      | I want all papers from Ignacio Ordovás Pascual about machine learning | all:"machine learning" |
      | Get all papers from Ignacio Ordovás Pascual about AGN | all:agn |

      USER REQUEST: {user_input}
      ARXIV QUERY:

  # ===========================================================================
  # TWO-STEP CATEGORY CLASSIFICATION
  # ===========================================================================
  # Instead of one 300-line prompt with 150+ codes (which causes attention
  # dilution in small models), we split into:
  #   Step 1: Classify the user request into a broad academic domain
  #   Step 2: Map to specific arXiv codes using ONLY that domain's list
  #
  # This reduces the code list each model sees from 150+ to 5-40 codes,
  # dramatically improving accuracy for small models that lose focus on
  # the full list.
  #
  # The existing single-step PROMPT_ARXIV_CATEGORY is preserved above for
  # A/B comparison. The query_builder selects between them via category_mode.
  # ===========================================================================

  # ---- Step 1: Domain classification ----
  category_domain:
    name: CATEGORY_DOMAIN_PROMPT
    content: |
      You classify research topics into broad academic domains.

      CRITICAL: Return ONLY one or two domain labels. No explanations, no prose.

      Choose from: CS, PHYSICS, MATH, STATS, BIOLOGY, ECON, ENGINEERING, NONLINEAR

      Rules:
      - Return the SINGLE most relevant domain label.
      - If the topic clearly spans two domains, return both separated by comma: CS, MATH
      - Return NONE if no academic domain applies, or if only author names are given with no topic.

      Domain descriptions:
      - CS: Computer science, AI, machine learning, NLP, computer vision, robotics, software, databases, networks
      - PHYSICS: Astrophysics, quantum physics, particle physics, condensed matter, nuclear, optics, fluid dynamics, cosmology, relativity, AGN, SMBH
      - MATH: Pure and applied mathematics, algebra, geometry, topology, number theory, analysis, probability
      - STATS: Statistics, statistical learning, econometrics methods, statistical methodology
      - BIOLOGY: Quantitative biology, genomics, molecular biology, neuroscience, evolution, cell biology
      - ECON: Economics, finance, portfolio management, pricing, risk management, trading
      - ENGINEERING: Electrical engineering, signal processing, audio/speech processing, image/video processing, systems and control
      - NONLINEAR: Nonlinear sciences, chaotic dynamics, pattern formation, cellular automata

      Examples:
      | Request | Domain |
      |---|---|
      | Papers about machine learning applications in healthcare | CS |
      | Deep learning for computer vision | CS |
      | Natural language processing methods | CS |
      | Quantum computing algorithms | PHYSICS |
      | Papers about AGN | PHYSICS |
      | Advances in transformer neural networks | CS |
      | Loop Quantum Gravity | PHYSICS |
      | Papers about SMBH | PHYSICS |
      | Cosmology or numerical analysis papers | PHYSICS, MATH |
      | Papers about econometrics | ECON |
      | Papers in statistics | STATS |
      | Papers about genomics | BIOLOGY |
      | Papers about signal processing | ENGINEERING |
      | Papers by Ignacio García | NONE |
      | Papers by Roberto Fulánez-Santos | NONE |
      | Find the paper with arXiv ID 1704.01595 | NONE |

      USER REQUEST: {user_input}
      DOMAIN:

  # ---- Step 2: Domain-specific category prompts ----
  # Each prompt contains ONLY the codes for that domain, keeping the list
  # short enough for small models to attend to reliably.

